<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Bakery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 class="logo">
        <a href="index.html">Bakery <span>🍞</span></a>
      </h1>
      <div id="hamburger" class="hamburger">
        <span></span><span></span><span></span>
      </div>
      <nav id="nav-menu" class="nav-menu">
        <a href="index.html" class="nav-link"><span>Home</span></a>
        <a href="menu.html" class="nav-link"><span>Menu</span></a>
        <a href="about.html" class="nav-link"><span>About</span></a>
        <a href="gallery.html" class="nav-link"><span>Gallery</span></a>
        <a href="contact.html" class="nav-link"><span>Contact</span></a>
      </nav>
    </header>

    <section class="hero">
      <img src="images/hero.jpg" alt="パン屋の店内" class="hero-img" />
      <div class="hero-text">
        <h2 class="hero-title">毎日焼きたてのパン</h2>
        <p class="hero-sub">地元の素材で作るこだわりの味</p>
        <a href="menu.html" class="btn hero-btn">メニューを見る</a>
      </div>
    </section>

    <section id="menu">
      <h2>おすすめメニュー</h2>
      <div class="menu-layout">
        <div class="menu-card">
          <img src="images/menu1.jpg" alt="クロワッサン" />
          <h3>クロワッサン</h3>
        </div>
        <div class="menu-card">
          <img src="images/menu2.jpg" alt="フランスパン" />
          <h3>フランスパン</h3>
        </div>
        <div class="menu-card">
          <img src="images/menu4.jpg" alt="メロンパン" />
          <h3>メロンパン</h3>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 Bakery</p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
