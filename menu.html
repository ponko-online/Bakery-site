<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Menu | Bakery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 class="logo">
        <a href="index.html">Bakery <span>🍞</span></a>
      </h1>
      <div id="hamburger" class="hamburger">
        <span></span><span></span><span></span>
      </div>
      <nav id="nav-menu" class="nav-menu">
        <a href="index.html" class="nav-link"><span>Home</span></a>
        <a href="menu.html" class="nav-link"><span>Menu</span></a>
        <a href="about.html" class="nav-link"><span>About</span></a>
        <a href="gallery.html" class="nav-link"><span>Gallery</span></a>
        <a href="contact.html" class="nav-link"><span>Contact</span></a>
      </nav>
    </header>

    <section id="menu">
      <h2>メニュー一覧</h2>
      <div class="menu-layout">
        <div class="tabs">
          <button class="tab active" data-tab="savory">おかず系</button>
          <button class="tab" data-tab="sweet">スイーツ系</button>
          <button class="tab" data-tab="drink">飲み物</button>
        </div>

        <div class="menu-group savory active">
          <div class="menu-card">
            <img src="images/menu5.jpg" alt="ウインナーパン" />
            <h3>ウインナーパン</h3>
            <p>ウインナーパリッ！パンふわっ！</p>
          </div>
          <div class="menu-card">
            <img src="images/menu2.jpg" alt="フランスパン" />
            <h3>フランスパン</h3>
            <p>外はカリッ、中はもっちりの定番パン</p>
          </div>
          <div class="menu-card">
            <img src="images/menu6.jpg" alt="カレーパン" />
            <h3>カレーパン</h3>
            <p>定番のうまいやつ</p>
          </div>
        </div>

        <div class="menu-group sweet">
          <div class="menu-card">
            <img src="images/menu3.jpg" alt="あんぱん" />
            <h3>あんぱん</h3>
            <p>こしあん入りの甘さ控えめパン</p>
          </div>
          <!-- 追加メニューもここに -->
          <div class="menu-card">
            <img src="images/menu4.jpg" alt="メロンパン" />
            <h3>メロンパン</h3>
            <p>とにかくうまい</p>
          </div>
          <div class="menu-card">
            <img src="images/menu1.jpg" alt="クロワッサン" />
            <h3>クロワッサン</h3>
            <p>サクサクでバターの香りがたまらない</p>
          </div>
        </div>

        <div class="menu-group drink">
          <div class="menu-card">
            <img src="images/coffee.jpg" alt="コーヒー" />
            <h3>コーヒー</h3>
            <p>こだわりのブレンド</p>
          </div>
          <div class="menu-card">
            <img src="images/coffee2.jpg" alt="カフェオレ" />
            <h3>カフェオレ</h3>
            <p>まろやかな口当たり</p>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 Bakery</p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
