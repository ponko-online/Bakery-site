<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Pacifico&display=swap" rel="stylesheet">
    <title>Contact | Bakery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 class="logo">
        <a href="index.html">Bakery <span>🍞</span></a>
      </h1>
      <div id="hamburger" class="hamburger">
        <span></span><span></span><span></span>
      </div>
      <nav id="nav-menu" class="nav-menu">
        <a href="index.html" class="nav-link"><span>Home</span></a>
        <a href="menu.html" class="nav-link"><span>Menu</span></a>
        <a href="about.html" class="nav-link"><span>About</span></a>
        <a href="gallery.html" class="nav-link"><span>Gallery</span></a>
        <a href="contact.html" class="nav-link"><span>Contact</span></a>
      </nav>
    </header>
        <section id="contact" class="fade-in">
            <h2>Contact</h2>
            <div class="contact-container">
              <!-- お問い合わせフォーム -->
              <form class="contact-form">
                <label for="name">お名前</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="例：山田太郎"
                  required
                />
      
                <label for="email">メールアドレス</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="example@example.com"
                  required
                />
      
                <label for="message">お問い合わせ内容</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="内容を入力してください"
                  required
                ></textarea>
      
                <button type="submit">送信</button>
              </form>
    </section>

    <footer>
      <p>&copy; 2026 Bakery</p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
